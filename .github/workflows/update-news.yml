name: Update AI and IT News

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh news JSON
        run: node scripts/update-news.mjs

      - name: Commit updated feed
        run: |
          if git diff --quiet -- src/data/news.json public/data/news.json; then
            echo "No news changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json public/data/news.json
          git commit -m "Update AI and IT news feed"
          git push
